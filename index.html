<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Toi ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #6a0dad, #ff4fd8);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* Carte */
.container {
  width: 92%;
  max-width: 380px;
  height: 520px;
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(255,0,255,0.4);
  animation: vibrate 0.4s infinite;
}

/* vibration */
@keyframes vibrate {
  0% { transform: translate(0); }
  50% { transform: translate(1px, -1px); }
  100% { transform: translate(0); }
}

/* Pages */
.page {
  display: none;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  padding: 25px;
  box-sizing: border-box;
  text-align: center;
  position: absolute;
  top: 0;
  left: 0;
}

.page.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* Overlay */
.overlay {
  background: rgba(0,0,0,0.6);
  padding: 20px;
  border-radius: 20px;
}

/* Texte */
.text {
  font-size: 16px;
  line-height: 1.5;
}

/* Bouton */
.button {
  margin-top: 25px;
  padding: 14px 20px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff4fd8, #a020f0);
  color: white;
  cursor: pointer;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* Coeurs */
.heart {
  position: absolute;
  color: #ff80ff;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10px); opacity:1; }
  100% { transform: translateY(600px); opacity:0; }
}
</style>

</head>
<body>

<div class="container">

  <!-- PAGE 1 -->
  <div class="page active" id="page1" style="background-image:url('images/bg1.jpg');">
    <div class="overlay">
      <div class="text" id="text1"></div>
      <button class="button" onclick="nextPage(2)">azy clique ici 💜</button>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2" style="background-image:url('images/bg2.jpg');">
    <div class="overlay">
      <div class="text" id="text2"></div>
      <button class="button" onclick="nextPage(3)">azy clique ici si tu m'aimes encore 💜</button>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="page3" style="background-image:url('images/bg2.jpg');">
    <div class="overlay">
      <div class="text" id="text3"></div>
      <p style="font-size:13px;opacity:0.8;">(clique et envoie sans réfléchir 😗💜)</p>
      <button class="button" onclick="openWhatsApp()">Clique ici 💜</button>
    </div>
  </div>

</div>

<audio id="music" src="audio/song.mp3"></audio>

<script>
// effet machine à écrire
function typeText(id, text, speed=35) {
  let i = 0;
  let el = document.getElementById(id);
  el.innerHTML = "";
  function typing() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// textes
let text1 = "Joyeux anniversaire ❤️ Je sais que parfois je fais le con… mais je t’aime vraiment 💜";
let text2 = "Tu es la plus belle chose qui m’est arrivée 💖 Merci d’être avec moi malgré mes conneries 🥺 Joyeux anniversaire bebs ❤️";
let text3 = "Tu m’aimes toujours 😏💜";

// lancer premier texte
typeText("text1", text1);

// navigation
function nextPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page" + page).classList.add("active");

  if(page === 2) typeText("text2", text2);
  if(page === 3) typeText("text3", text3);

  document.getElementById("music").play();
}

// WhatsApp
function openWhatsApp() {
  let url = "https://api.whatsapp.com/send?phone=243831055361&text=Moi aussi je t'aime ❤️";
  window.open(url);
}

// coeurs
function createHeart() {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💜";
  heart.style.left = Math.random() * 100 + "%";
  heart.style.fontSize = (Math.random() * 15 + 10) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);

</script>

</body>
</html>
